site:
  title: "Inkwell Theme"
  subtitle: 'A Refined Astro Blog Theme'
  description: A minimalist, content-focused blog theme built with Astro.
  url: https://inkwell.mini-max.top
  startDate: '2024-01-01'
  timezone: Asia/Shanghai
  heroImage: https://cdn.jsdelivr.net/gh/volantis-x/cdn-wallpaper-minimalist/2020/006.jpg
  postsPerPage: 20
  travellings: https://www.travellings.cn/go

# 静态资源CDN（可选，用于加速图片等资源）
# cdn: https://cdn.example.com

author:
  name: Author Name
  bio: |
    Technology · Design · Life
    Write something interesting here
  avatar: https://api.dicebear.com/7.x/notionists/svg?seed=Felix
  language: zh-CN

# 头像配置
avatar:
  # 头像形状：circle（圆形）| square（方形）| rounded（圆角方形）
  shape: circle
  # 头像尺寸（px），用于侧边栏 ProfileWidget
  size: 80
  # 头像边框：none | ring（光晕环）
  border: ring

# 主页背景配置
background:
  # 背景图片 URL（留空则使用纯色背景）
  image: ''
  # 图片高斯模糊强度（px），0 表示不模糊
  blur: 0
  # 遮罩透明度（0.0 ~ 1.0），0 表示无遮罩
  overlay: 0.3
  # 遮罩颜色（CSS 颜色值）
  overlayColor: '#000'

# 站点统计配置（Umami，隐私友好的自托管统计）
# 部署教程：https://umami.is/docs/getting-started
stats:
  umami:
    enabled: false
    # Umami 脚本地址，例如 https://analytics.example.com/script.js
    src: ''
    # 在 Umami 中创建网站后获得的 Website ID
    websiteId: ''

social:
  github: your_github
  twitter: ""
  email: hello@example.com

giscus:
  repo: your-github-user/your-repo-name
  repoId: "your_repo_id"
  category: Announcements
  categoryId: "your_category_id"
  lang: zh-CN

# 站点信息 Widget 配置（侧边栏）
siteInfo:
  # 数字统计的显示风格：
  #   block  — icon + 数字块卡片（2列网格，视觉突出）
  #   text   — 纯文字行（与建站/更新时间风格一致，轻量）
  statStyle: block
  showRuntime: true       # 已运行时间（动态计算）
  showPostCount: true     # 文章数
  showTagCount: true      # 标签数
  showWordCount: true     # 总字数
  showStartDate: true     # 建站日期（来自 site.startDate）
  showLastUpdated: true   # 最后构建时间（自动取当前构建时间）

# Footer 配置
footer:
  # 版权行：© {year} {author.name}（始终显示，不可关闭）
  # 以下各项设为 false 可在 Footer 中隐藏
  showPoweredBy: true        # "Powered by Astro"
  showTheme: true            # "Theme Inkwell"
  showHosted: false           # "Hosted on GitHub Pages"
  # 自定义托管文字和链接（showHosted: true 时生效）
  hostedLabel: GitHub Pages
  hostedUrl: https://pages.github.com
  # Footer 链接（留空则不显示）
  links:
    - label: RSS
      href: /rss.xml
    - label: Sitemap
      href: /sitemap-index.xml

navLinks:
  - href: /
    label: 首页
  - href: /archives
    label: 归档
  - href: /categories
    label: 分类
  - href: /friends
    label: 友链
  - href: /about
    label: 关于

# 日期时间格式
dateFormat: YYYY-MM-DD
timeFormat: HH:mm:ss

# 内容源配置
# postsDir: 博文 Markdown 源文件的目录路径
#   - 支持相对路径（相对于项目根目录）和绝对路径
#   - 默认值：src/content/posts
content:
  postsDir: src/content/posts

# 文章配置
post:
  # 首页文章列表样式：horizontal（左图右文，默认）| card（上图下文）
  listStyle: card
  # 是否默认启用数学公式渲染（KaTeX/MathJax）
  math: true
  # 是否默认启用代码高亮
  codeHighlight: true
  # 代码块是否显示行号
  lineNumber: true

license:
  default: CC-BY-SA
  presets:
    CC-BY:
      name: CC BY 4.0
      url: https://creativecommons.org/licenses/by/4.0/
      notice: 转载请署名原作者，可商业使用。
    CC-BY-SA:
      name: CC BY-SA 4.0
      url: https://creativecommons.org/licenses/by-sa/4.0/
      notice: 转载请署名并以相同协议共享。
    CC-BY-NC:
      name: CC BY-NC 4.0
      url: https://creativecommons.org/licenses/by-nc/4.0/
      notice: 转载须署名，不可商业使用。
    CC-BY-NC-SA:
      name: CC BY-NC-SA 4.0
      url: https://creativecommons.org/licenses/by-nc-sa/4.0/
      notice: 转载须署名且以相同协议共享，不可商业使用。
    CC-BY-ND:
      name: CC BY-ND 4.0
      url: https://creativecommons.org/licenses/by-nd/4.0/
      notice: 转载须署名且不得演绎，可商业使用。
    CC-BY-NC-ND:
      name: CC BY-NC-ND 4.0
      url: https://creativecommons.org/licenses/by-nc-nd/4.0/
      notice: 转载须署名且不得演绎，不可商业使用。
    CC0:
      name: CC0 1.0（公共领域）
      url: https://creativecommons.org/publicdomain/zero/1.0/
      notice: 本文已进入公共领域，可自由使用、修改、传播。
    MIT:
      name: MIT License
      url: https://opensource.org/licenses/MIT
      notice: 可自由使用、修改及分发，需保留原始版权声明。
    APACHE-2:
      name: Apache License 2.0
      url: https://www.apache.org/licenses/LICENSE-2.0
      notice: 可自由使用、修改及分发，需保留版权与声明文件。
    GPL-3:
      name: GPL v3.0
      url: https://www.gnu.org/licenses/gpl-3.0.html
      notice: 修改后的版本须以相同协议开源发布。
    ARR:
      name: 保留所有权利
      url: https://en.wikipedia.org/wiki/All_rights_reserved
      notice: 未经授权，不得转载、商用或演绎。
  aliases:
    DEFAULT: CC-BY-SA
    CC: CC-BY-SA
    APACHE: APACHE-2
    GPL: GPL-3
    ALL-RIGHTS: ARR
    COPYRIGHT: ARR

# ═══════════════════════════════════════════════════════════════════════════
# AI 配置
# ═══════════════════════════════════════════════════════════════════════════
# 
# 支持多种 AI provider：
#   - openai: OpenAI 及所有兼容 API（Azure、Ollama、vLLM 等）
#   - anthropic: Claude 原生 API
#   - gemini: Google Gemini 原生 API
# 
# 使用方法：
#   1. 选择一个 provider
#   2. 在 .env 中配置对应的 API Key
#   3. 运行 node scripts/ai-preprocess.mjs
#
# CLI 参数：
#   --dry-run    只预览，不写入文件
#   --new-only   只处理没有摘要的博文
# 
ai:
  enabled: false
  provider: anthropic           # openai | anthropic | gemini
  
  # 摘要配置
  summary:
    maxPoints: 4                # 要点数量上限
    maxCharsPerPoint: 60        # 每点字数上限
    prompt: |
      你是一个专业的文章摘要助手。请阅读以下文章，生成 3-4 个简短、专业、有吸引力的要点。
      要求：
      1. 语言简洁，每条不超过 60 字
      2. 涵盖文章核心观点或技术细节
      3. 使用中文
      4. 返回纯 JSON 数组，例如：["要点1", "要点2", "要点3"]
      5. 不要包含任何解释性文字或代码块标签，每条要点要完整展示，不要用省略号截断
  
  # SEO 描述配置
  description:
    autoGenerate: true          # 是否从摘要自动生成 SEO 描述
    maxLength: 120              # SEO 描述字数限制
  
  # Provider 配置（每个 provider 一组）
  providers:
    openai:
      # OpenAI 兼容 API
      apiKey: ${OPENAI_API_KEY}
      model: gpt-4o-mini
      endpoint: https://api.openai.com/v1
      # displayName: 自定义模型显示名称（用于 AI 卡片右上角），不填则使用 model 字段
      displayName: AI Abstract
    anthropic:
      # Anthropic API
      apiKey: ${ANTHROPIC_API_KEY}
      model: claude-3-haiku-20240307
      endpoint: https://api.anthropic.com
      displayName: AI Abstract
    gemini:
      # API Key 在 .env 中配置：GEMINI_API_KEY=xxx
      apiKey: ${GEMINI_API_KEY}
      model: gemini-2.0-flash
      endpoint: https://generativelanguage.googleapis.com/v1beta
      # displayName: Gemini
  
  # 未来 AI 能力开关（预留扩展）
  capabilities:
    summary: true               # 摘要生成（当前）
    translate: false            # 多语言翻译（未来）
    imageGen: false             # 图片生成（未来）
    chat: false                 # 对话交互（未来）

# ═══════════════════════════════════════════════════════════════════════════
# Webhook 配置
# ═══════════════════════════════════════════════════════════════════════════
# 文章发布/更新时自动通知外部服务（AI Agent、自动化工作流等）
#
webhook:
  enabled: false
  # 构建完成后触发的 Webhook URL 列表（支持多个）
  urls:
    - url: ''
      method: POST              # POST | GET
      headers:                 # 自定义请求头
        Authorization: ''       # 如：Bearer xxx
      # 触发事件：deploy（每次构建完成）、publish（文章发布/更新时）
      events:
        - deploy
      # 请求体模板（支持变量：{{siteUrl}}, {{postTitle}}, {{postUrl}}, {{eventType}}）
      body_template: |
        {
          "event": "{{eventType}}",
          "site": "{{siteUrl}}",
          "timestamp": "{{timestamp}}",
          "post": {
            "title": "{{postTitle}}",
            "url": "{{postUrl}}"
          }
        }

# ═══════════════════════════════════════════════════════════════════════════
# Agent/API 配置（供 AI Agent 读取的机器可读端点）
# ═══════════════════════════════════════════════════════════════════════════
agent:
  # 站点提供的机器可读端点（无需配置，自动启用）
  endpoints:
    - /feed.json        # JSON Feed（完整内容）
    - /rss.xml          # RSS Feed
    - /api/posts.json    # 文章索引（JSON）
    - /api/search.json   # 搜索接口
    - /api/status.json   # 站点状态
